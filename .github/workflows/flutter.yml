name: WallRio Build Generation For Android

on:
  push:
    branches:
      - wallrio-prod

permissions:
  contents: write

jobs:
  build-and-release-wallrio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Bump Version in pubspec.yaml
        run: |
          CURRENT=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          SEMVER=$(echo $CURRENT | cut -d'+' -f1)
          BUILD=$(echo $CURRENT | cut -d'+' -f2)
          MAJOR=$(echo $SEMVER | cut -d'.' -f1)
          MINOR=$(echo $SEMVER | cut -d'.' -f2)
          PATCH=$(echo $SEMVER | cut -d'.' -f3)
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))+$((BUILD + 1))"
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          echo "Bumped version: $CURRENT → $NEW_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          SIGNING_KEY_STORE_PATH: ${{ secrets.SIGNING_KEY_STORE_PATH }}
        run: |
          echo $ENCODED_STRING > keystore-b64.txt
          base64 -d keystore-b64.txt > $SIGNING_KEY_STORE_PATH
      - name: Read App version from Pubspec YAML
        id: app-version
        uses: jbutcher5/read-yaml@main
        with:
          file: "pubspec.yaml"
          key-path: '["version"]'
      - name: Setup Java to compile the project
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Install and setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:" # optional, change this to force refresh cache
          cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:" # optional, change this to specify the cache path
          architecture: x64 # optional, x64 or arm64
      - run: flutter --version
      - name: Install project dependencies
        run: flutter pub get
      - name: Generate intermediates
        run: flutter pub run build_runner build --delete-conflicting-outputs
      - name: Flutter Build Release for Android
        env:
          SIGNING_KEY_STORE_PATH: ${{ secrets.SIGNING_KEY_STORE_PATH }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          printf 'keyAlias=%s\nkeyPassword=%s\nstoreFile=%s\nstorePassword=%s\n' \
            "$SIGNING_KEY_ALIAS" "$SIGNING_KEY_PASSWORD" "$GITHUB_WORKSPACE/$SIGNING_KEY_STORE_PATH" "$SIGNING_STORE_PASSWORD" \
            > android/key.properties
          flutter build apk --release --split-per-abi
          flutter build appbundle --release
      - name: Archive Release
        uses: thedoctor0/zip-release@master
        with:
          type: "zip"
          filename: WallRio-${{steps.app-version.outputs.data}}.zip
          directory: build/app/outputs/flutter-apk/
      - name: Android Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{steps.app-version.outputs.data}}
          name: WallRio v${{steps.app-version.outputs.data}}
          files: build/app/outputs/flutter-apk/WallRio-${{steps.app-version.outputs.data}}.zip
      - name: Configure Service Account JSON
        run: echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json
      - name: Upload Release to Play store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service_account.json
          packageName: com.shadowteam.wallrio
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          whatsNewDirectory: distribution/whatsnew
          releaseName: ${{steps.app-version.outputs.data}}
          track: production
          status: completed
          inAppUpdatePriority: 2
