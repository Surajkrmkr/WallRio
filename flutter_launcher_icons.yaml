dev_dependencies:
  flutter_launcher_icons: "^0.14.4"

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  remove_alpha_ios: true # App Store rejects a large icon with an alpha channel
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false