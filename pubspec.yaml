name: wallrio
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.1+11

environment:
  sdk: ">=2.18.4 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # android_download_manager: ^1.0.0
  # android_path_provider: ^0.3.0
  animations: ^2.0.11
  build_runner: ^2.4.13
  cached_network_image: ^3.4.1
  change_app_package_name: ^1.4.0
  cloud_firestore: ^5.4.4
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  firebase_analytics: ^11.3.3
  firebase_app_check: ^0.3.1
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_messaging: ^15.1.3
  flutter_cache_manager: ^3.4.1
  flutter_launcher_icons: ^0.14.1
  flutter_local_notifications: ^17.2.4
  flutter_native_splash: ^2.3.8
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.0.9
  # flutter_windowmanager: ^0.2.0
  fluttertoast: ^8.2.4
  google_mobile_ads: ^5.2.0
  google_sign_in: ^6.2.1
  in_app_purchase: ^3.1.11
  in_app_update: ^4.2.2
  logger: ^2.0.2+1
  lottie: ^3.1.3
  package_info_plus: ^8.1.0
  palette_generator: ^0.3.3+3
  path_provider: ^2.1.1
  permission_handler: ^11.3.1
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  simple_gradient_text: ^1.3.0
  url_launcher: ^6.2.2
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0+3
  wallpaper_manager_flutter: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/lottie/
    - assets/app_icon/

  fonts:
    - family: POCOTech
      fonts:
        - asset: font/POCOTech-cool-Light.otf
          weight: 300
        - asset: font/POCOTech-cool-Book.otf
          weight: 400
        - asset: font/POCOTech-cool-Regular.otf
          weight: 500
        - asset: font/POCOTech-cool-Medium.otf
          weight: 600
        - asset: font/POCOTech-cool-SemiBold.otf
          weight: 700
        - asset: font/POCOTech-cool-Bold.otf
          weight: 800
